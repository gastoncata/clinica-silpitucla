# Blueprint de Render: deploy con un click desde el repo.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: clinica-silpitucla
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        value: https://mscarqjmccggkcmaxnfq.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # se carga a mano en el dashboard de Render (es secreta)
